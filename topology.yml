# NetLab IS-IS Multi-Area Lab
# ============================
# Demonstrates the following IS-IS concepts:
#
#   L1          – Level-1 routing (intra-area only)
#   L2          – Level-2 routing (inter-area backbone)
#   L1/L2       – Border routers that participate in both levels
#   DIS         – Designated IS election on multi-access LAN segments
#   Pseudo-node – Virtual node LSP generated by the DIS to represent a LAN
#   Suboptimal  – L1 routers default toward the nearest L1/L2 router, not
#                 the end-to-end shortest path (demonstrated via metrics)
#   Route leak  – Leaking specific L2 prefixes back into L1 to fix
#                 suboptimal inter-area routing
#   Redistrib.  – Importing a non-IS-IS connected prefix into the IS-IS domain
#                 via "redistribute connected" on the attached router (r5)
#
# Areas:
#   49.0001 – Area 1  (4-router LAN for DIS election demo)
#   49.0002 – Area 2  (point-to-point links only)
#   49.0003 – Area 3  (point-to-point link)
#
# Note: In IS-IS there is no concept of an "ABR" (Area Border Router, which
#       is OSPF terminology). The routers that participate in both L1 and L2
#       are simply called L1/L2 routers or border routers (br1–br4 here).
#
# Device:   Nokia SR Linux – public container image, no manual download needed
# Provider: Containerlab (clab)

defaults:
  device: srlinux
  provider: clab

module: [ isis ]

# Default area applied to every node unless overridden.
isis:
  area: "49.0001"

nodes:

  # ── Area 49.0001 ─────────────────────────────────────────────────────────────
  # r1, r2, and br2 share a multi-access LAN segment → IS-IS DIS election here.
  # br1 is connected to r1 and r2 via separate P2P links (see links section).
  # The elected DIS generates a pseudo-node LSP representing the broadcast link.
  # r1 and r2 are pure Level-1 routers; br1 and br2 are L1/L2 border routers.
  # Both L1/L2 routers inject a default route into Area 1, which creates the
  # suboptimal routing scenario described in the links section below.
  r1:
    isis:
      type: level-1

  r2:
    isis:
      type: level-1

  br1:   # Area 1 ↔ L2 backbone — direct link to Area 3 (shorter L2 path)
    isis:
      type: level-1-2

  br2:   # Area 1 ↔ L2 backbone — reaches Area 3 via Area 2 (longer L2 path)
    isis:
      type: level-1-2

  # ── Area 49.0002 ─────────────────────────────────────────────────────────────
  # Two L1 routers connected via point-to-point links to the L1/L2 border
  # router.  No LAN segment → no DIS election in this area.
  r3:
    isis:
      area: "49.0002"
      type: level-1

  r4:
    isis:
      area: "49.0002"
      type: level-1

  br3:   # Area 2 ↔ L2 backbone
    isis:
      area: "49.0002"
      type: level-1-2

  # ── Area 49.0003 ─────────────────────────────────────────────────────────────
  # Two routers on a point-to-point link (no DIS election on P2P).
  r5:
    isis:
      area: "49.0003"
      type: level-1

  br4:   # Area 3 ↔ L2 backbone
    isis:
      area: "49.0003"
      type: level-1-2

  # ── External host (non-IS-IS) ─────────────────────────────────────────────────
  # 'ext' is a plain Linux host that does NOT run IS-IS.  It is connected to r5
  # via a dedicated link (192.168.100.0/24).  The prefix is a simple connected
  # route on r5 — it does NOT appear in the IS-IS LSDB until the operator
  # configures "redistribute connected" on r5 (see README for the exercise).
  ext:
    module: []    # no routing protocol — this node is outside IS-IS
    device: linux

links:

  # ── Area 49.0001 LAN (multi-access, 3 routers) ───────────────────────────────
  # IS-IS elects a DIS on this segment (highest priority → highest MAC address).
  # The DIS creates a pseudo-node LSP that represents the shared LAN.
  #
  # Only r1, r2, and br2 share this LAN.  br1 is intentionally kept off the
  # LAN and connected to r1/r2 via separate P2P links (see below).
  #
  # On a multi-access LAN the IS-IS SPF cost from any router to every
  # neighbour on the same LAN equals that router's own outgoing interface
  # metric (because the pseudo-node always advertises zero-cost links back).
  # This means interface metrics on br1 or br2 have no effect on how r1/r2
  # perceive the cost to each border router — both would appear at the same
  # cost (r1's own LAN metric).  Moving br1 onto a separate P2P link with a
  # higher metric is therefore the correct way to make r1/r2 prefer br2 as
  # their L1 default gateway while still demonstrating DIS election on the LAN.
  - r1:
    r2:
    br2:

  # ── P2P links: br1 to r1 and r2 (higher metric → r1/r2 prefer br2) ──────────
  # Because these are point-to-point links, the metric set on r1/r2's side is
  # exactly the SPF cost r1/r2 will use to reach br1.  Setting it to 20 (versus
  # br2's effective cost of 10 via the LAN) ensures r1 and r2 install a single
  # default route via br2, creating the suboptimal routing scenario.
  - r1:
      isis:
        metric: 20   # higher → r1 prefers br2 as L1 default gateway
    br1:
  - r2:
      isis:
        metric: 20   # higher → r2 prefers br2 as L1 default gateway
    br1:

  # ── Customer (stub) networks in Area 49.0001 ─────────────────────────────────
  - r1:
    role: stub
    prefix: 10.1.1.0/24

  - r2:
    role: stub
    prefix: 10.1.2.0/24

  # ── Area 49.0002 (point-to-point links) ──────────────────────────────────────
  # Each L1 router connects to the L1/L2 border router via a separate P2P link.
  # No LAN segment → no DIS election in this area.
  - r3:
    br3:

  - r4:
    br3:

  # ── Customer (stub) networks in Area 49.0002 ─────────────────────────────────
  - r3:
    role: stub
    prefix: 10.2.1.0/24

  - r4:
    role: stub
    prefix: 10.2.2.0/24

  # ── Area 49.0003 (point-to-point) ────────────────────────────────────────────
  # No DIS election on a P2P link; IS-IS forms a direct adjacency instead.
  - r5:
    br4:

  # ── Customer (stub) network in Area 49.0003 ──────────────────────────────────
  - r5:
    role: stub
    prefix: 10.3.1.0/24

  # ── External (non-IS-IS) network ─────────────────────────────────────────────
  # This link is NOT a stub — it is a regular point-to-point link between r5
  # (which runs IS-IS) and ext (which does NOT).  Because ext has no IS-IS
  # process, the r5 interface on this link is a plain connected route.
  # Configuring "redistribute connected" on r5 brings 192.168.100.0/24 into
  # the IS-IS LSDB so every other router can reach the external host.
  - r5:
    ext:
    prefix: 192.168.100.0/24

  # ── L2 Backbone links ─────────────────────────────────────────────────────────
  # These P2P links form the Level-2 "backbone" between the L1/L2 border routers.
  #
  # br1 ──(metric 5)── br4          direct to Area 3 (total L2 cost: 5)
  # br2 ──(metric 10)── br3 ──(metric 10)── br4   via Area 2 (total: 20)
  #
  # Because r1/r2 prefer br2 for their L1 default route, traffic to Area 3
  # follows the longer path (br2→br3→br4) instead of the shorter one
  # (br1→br4).  Route leaking from br1 into Area 1 fixes this.

  - br1:
    br4:
    isis:
      metric: 5

  - br2:
    br3:
    isis:
      metric: 10

  - br3:
    br4:
    isis:
      metric: 10
