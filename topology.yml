# NetLab IS-IS Multi-Area Lab
# ============================
# Demonstrates the following IS-IS concepts:
#
#   L1          – Level-1 routing (intra-area only)
#   L2          – Level-2 routing (inter-area backbone)
#   L1/L2       – Border routers that participate in both levels
#   DIS         – Designated IS election on multi-access LAN segments
#   Pseudo-node – Virtual node LSP generated by the DIS to represent a LAN
#   Suboptimal  – L1 routers default toward the nearest L1/L2 router, not
#                 the end-to-end shortest path (demonstrated via metrics)
#   Route leak  – Leaking specific L2 prefixes back into L1 to fix
#                 suboptimal inter-area routing
#
# Areas:
#   49.0001 – Area 1  (4-router LAN for DIS election demo)
#   49.0002 – Area 2  (3-router LAN)
#   49.0003 – Area 3  (point-to-point link)
#
# Device:   FRRouting (FRR) – open-source routing suite
# Provider: Containerlab (clab)

defaults:
  device: frr
  provider: clab

module: [ isis ]

# Default area applied to every node unless overridden.
isis:
  area: 49.0001

nodes:

  # ── Area 49.0001 ─────────────────────────────────────────────────────────────
  # Four routers share a single LAN segment → IS-IS DIS election occurs here.
  # The elected DIS generates a pseudo-node LSP representing the broadcast link.
  # r1 and r2 are pure Level-1 routers; abr1 and abr2 are L1/L2 border routers.
  # Both ABRs inject a default route into Area 1, which creates the suboptimal
  # routing scenario described in the links section below.
  r1:
    isis:
      type: level-1

  r2:
    isis:
      type: level-1

  abr1:   # Area 1 ↔ L2 backbone — direct link to Area 3 (shorter L2 path)
    isis:
      type: level-1-2

  abr2:   # Area 1 ↔ L2 backbone — reaches Area 3 via Area 2 (longer L2 path)
    isis:
      type: level-1-2

  # ── Area 49.0002 ─────────────────────────────────────────────────────────────
  # Three routers on a LAN — DIS election also happens here.
  r3:
    isis:
      area: 49.0002
      type: level-1

  r4:
    isis:
      area: 49.0002
      type: level-1

  abr3:   # Area 2 ↔ L2 backbone
    isis:
      area: 49.0002
      type: level-1-2

  # ── Area 49.0003 ─────────────────────────────────────────────────────────────
  # Two routers on a point-to-point link (no DIS election on P2P).
  r5:
    isis:
      area: 49.0003
      type: level-1

  abr4:   # Area 3 ↔ L2 backbone
    isis:
      area: 49.0003
      type: level-1-2

links:

  # ── Area 49.0001 LAN (multi-access, 4 routers) ───────────────────────────────
  # IS-IS elects a DIS on this segment (highest priority → highest MAC address).
  # The DIS creates a pseudo-node LSP that represents the shared LAN.
  #
  # abr1 is given a higher L1 metric on this LAN so that r1 and r2 prefer
  # abr2 as their default gateway into the L2 backbone.  However, abr1 has a
  # direct L2 link to abr4 (Area 3) while abr2 must traverse abr3 first.
  # This is the suboptimal routing scenario: L1 routers pick abr2 based on
  # the L1 metric alone, unaware that the end-to-end path via abr1 is shorter.
  - r1:
    r2:
    abr1:
      isis:
        metric: 20   # higher → r1/r2 prefer abr2 as L1 default gateway
    abr2:
      isis:
        metric: 10   # lower  → preferred L1 default gateway

  # ── Customer (stub) networks in Area 49.0001 ─────────────────────────────────
  - r1:
    role: stub
    prefix: 10.1.1.0/24

  - r2:
    role: stub
    prefix: 10.1.2.0/24

  # ── Area 49.0002 LAN (multi-access, 3 routers) ───────────────────────────────
  # A second LAN segment where DIS election can be observed in Area 2.
  - r3:
    r4:
    abr3:

  # ── Customer (stub) networks in Area 49.0002 ─────────────────────────────────
  - r3:
    role: stub
    prefix: 10.2.1.0/24

  - r4:
    role: stub
    prefix: 10.2.2.0/24

  # ── Area 49.0003 (point-to-point) ────────────────────────────────────────────
  # No DIS election on a P2P link; IS-IS forms a direct adjacency instead.
  - r5:
    abr4:

  # ── Customer (stub) network in Area 49.0003 ──────────────────────────────────
  - r5:
    role: stub
    prefix: 10.3.1.0/24

  # ── L2 Backbone links ─────────────────────────────────────────────────────────
  # These P2P links form the Level-2 "backbone" between the L1/L2 border routers.
  #
  # abr1 ──(metric 5)── abr4          direct to Area 3 (total L2 cost: 5)
  # abr2 ──(metric 10)── abr3 ──(metric 10)── abr4   via Area 2 (total: 20)
  #
  # Because r1/r2 prefer abr2 for their L1 default route, traffic to Area 3
  # follows the longer path (abr2→abr3→abr4) instead of the shorter one
  # (abr1→abr4).  Route leaking from abr1 into Area 1 fixes this.

  - abr1:
    abr4:
    isis:
      metric: 5

  - abr2:
    abr3:
    isis:
      metric: 10

  - abr3:
    abr4:
    isis:
      metric: 10
